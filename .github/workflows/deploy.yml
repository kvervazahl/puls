name: Deploy til Azure - puls-kverva

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login til Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy kode til Azure Web App
        run: |
          zip -r deploy.zip . -x "*.git*" -x "__pycache__/*" -x "*.pyc" -x "data/*"
          az webapp deploy \
            --name puls-kverva \
            --resource-group rg-puls \
            --src-path deploy.zip \
            --type zip
