name: Deploy til Azure - puls-kverva

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Login til Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Trigger deploy fra GitHub
        run: |
          az webapp deployment source sync \
            --name puls-kverva \
            --resource-group rg-puls
