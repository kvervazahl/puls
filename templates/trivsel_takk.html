<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kverva — Takk!</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --blue:#1e3a5f; --green:#16a34a; --bg:#f1f5f9; --card:#fff; --border:#e2e8f0; --muted:#64748b; --radius:14px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }
    header { background:var(--blue); color:#fff; padding:20px 24px; }
    .hdr-logo { font-size:1.1rem; font-weight:700; letter-spacing:.04em; }
    .hdr-logo span { color:#93c5fd; }
    .hdr-sub { font-size:.78rem; color:#93c5fd; margin-top:2px; }
    .wrap { max-width:480px; margin:60px auto; padding:0 16px; text-align:center; }
    .takk-box { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:var(--radius); padding:40px 32px; }
    .icon { font-size:3rem; margin-bottom:16px; }
    h2 { color:var(--green); font-size:1.4rem; margin-bottom:10px; }
    p { font-size:.9rem; color:var(--muted); line-height:1.6; }
    .footer { text-align:center; margin-top:32px; font-size:.75rem; color:var(--muted); }
  </style>
</head>
<body>
<header>
  <div class="hdr-logo">KVERVA <span>○</span> TRIVSEL</div>
  <div class="hdr-sub">Månedlig medarbeiderundersøkelse</div>
</header>
<div class="wrap">
  <div class="takk-box">
    <div class="icon">🙌</div>
    <h2>Takk for din tilbakemelding!</h2>
    <p>Svaret ditt er registrert anonymt.<br>
    Resultatene vil bli gjennomgått og delt med ledergruppen.</p>
  </div>
  <div class="footer">Kverva AS · Svarene lagres anonymt</div>
</div>
</body>
</html>
