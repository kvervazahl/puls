<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Takk! — Kverva Trivsel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --blue:#1e3a5f; --sea:#0d9488; --bg:#f0f9f8; --card:#fff; --border:#d1fae5; --muted:#64748b; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px 32px; max-width:460px; width:100%; text-align:center; box-shadow:0 4px 24px rgba(13,148,136,.08); }
    .icon { font-size:2.5rem; margin-bottom:16px; }
    h1 { font-size:1.2rem; font-weight:800; color:var(--blue); margin-bottom:10px; }
    p { font-size:.9rem; color:var(--muted); line-height:1.6; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Takk for svaret!</h1>
  <p>Ditt svar er registrert. Vi setter stor pris på at du tok deg tid.</p>
</div>
</body>
</html>
